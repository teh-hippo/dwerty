name: Build Ultra Firmware

on:
  push:
    tags:
      - "ultra-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Behaviour tests (upstream ZMK native_sim)
        working-directory: ultra
        # The scripts auto-detect the Podman preinstalled on ubuntu-latest and
        # run it with --userns=keep-id, so container-written files stay owned by
        # the runner (matching local) and need no sudo to clean up. The x86
        # Realtek prepend_header and PackCli in package.sh also run natively
        # here (no qemu); PackCli is fetched pinned and SHA256-verified.
        run: |
          ./scripts/test.sh
          rm -rf .cache/upstream   # reclaim disk before the fork build

      - name: Build firmware (Keychron fork) and package CFU
        working-directory: ultra
        run: |
          ./scripts/build.sh
          ./scripts/package.sh

      - name: Prepare release assets
        if: startsWith(github.ref, 'refs/tags/ultra-v')
        id: assets
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          # Keychron firmware anchor: the fork's ZMK app version (e.g. 1.0.2).
          V="ultra/.cache/fork/zmk/app/VERSION"
          MAJ=$(grep -oP 'VERSION_MAJOR\s*=\s*\K[0-9]+' "$V")
          MIN=$(grep -oP 'VERSION_MINOR\s*=\s*\K[0-9]+' "$V")
          PAT=$(grep -oP 'PATCHLEVEL\s*=\s*\K[0-9]+' "$V")
          echo "anchor=${MAJ}.${MIN}.${PAT}" >> "$GITHUB_OUTPUT"

          mkdir -p ultra/release
          add() {  # add <src> <release-name>
            cp "$1" "ultra/release/$2"
            sha256sum "ultra/release/$2" > "ultra/release/$2.sha256"
          }
          add ultra/build/zmk.bin        "${TAG}-keychron_v6_ultra.bin"
          add ultra/build/zmk.hex        "${TAG}-keychron_v6_ultra.hex"
          add ultra/build/zmk_ota_MP.bin "${TAG}-keychron_v6_ultra_ota_MP.bin"
          ( cd ultra/build && zip -rq cfu.zip cfu )
          add ultra/build/cfu.zip        "${TAG}-keychron_v6_ultra_cfu.zip"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ultra-firmware
          path: |
            ultra/build/zmk.bin
            ultra/build/zmk.hex
            ultra/build/zmk_ota_MP.bin
            ultra/build/cfu
          retention-days: 7

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/ultra-v')
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          name: "Keychron V6 Ultra 8K ${{ github.ref_name }}"
          prerelease: false
          body: |
            Dwerty firmware for the Keychron V6 Ultra 8K (ZMK), built on Keychron's ZMK fork (rtl8762g), which reports firmware version v${{ steps.assets.outputs.anchor }}.

            Verified on hardware. Flashing self-built firmware voids your warranty.

            To flash on Windows: pop off the spacebar keycap and hold the button beneath it while plugging in the USB cable to enter DFU (the keyboard enumerates as `0BDA:4762` "Keychron usb DFU"). Unzip `*_cfu.zip` and point Keychron's cfudownloadtool at the resulting `cfu` folder. To return to stock, re-enter DFU and reflash the official firmware from the Keychron Launcher.

            SHA256 sums are attached.
          files: |
            ultra/release/ultra-v*
          generate_release_notes: true

name: tests

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-tests:
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests
        run: ./scripts/test.sh

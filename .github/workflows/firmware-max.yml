name: Build Max Firmware

on:
  push:
    branches: [main]
    tags:
      - "max-v*"
  pull_request:
    paths:
      - "max/**"
      - ".github/workflows/firmware-max.yml"
  workflow_dispatch:

permissions:
  contents: write

env:
  QMK_REPO: https://github.com/Keychron/qmk_firmware.git
  QMK_BRANCH: wireless_playground
  KEYBOARD: keychron/v6_max/ansi_encoder
  KEYMAP: dvorak_qwerty

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Build container image
        run: docker build -t dwerty-qmk -f max/Containerfile max

      - name: Clone QMK and compile firmware
        run: |
          docker run --rm \
            -e QMK_REPO -e QMK_BRANCH -e KEYBOARD -e KEYMAP \
            -v "${{ github.workspace }}/max:/workspace:Z" \
            -w /workspace \
            dwerty-qmk /bin/bash -lc '
              set -euo pipefail

              git clone --depth 1 --branch "$QMK_BRANCH" "$QMK_REPO" /qmk
              git -C /qmk submodule update --init --recursive --depth 1

              src="/workspace/keymaps/keychron/v6_max/ansi_encoder/keymaps/$KEYMAP"
              dest="/qmk/keyboards/keychron/v6_max/ansi_encoder/keymaps/$KEYMAP"
              mkdir -p "$(dirname "$dest")"
              cp -a "$src" "$dest"

              # Patch keyboard rules.mk: enable snap click + per-key RGB
              # (must be before include keychron_common.mk, matching V3 Max)
              rules="/qmk/keyboards/keychron/v6_max/rules.mk"
              if ! grep -q "SNAP_CLICK_ENABLE" "$rules"; then
                sed -i "1i SNAP_CLICK_ENABLE=yes\nKEYCHRON_RGB_ENABLE=yes\n" "$rules"
              fi

              # Patch keyboard config.h: include eeconfig_kb.h early so
              # EECONFIG_KB_DATA_SIZE is defined before eeconfig.h guards
              config="/qmk/keyboards/keychron/v6_max/config.h"
              if ! grep -q "eeconfig_kb.h" "$config"; then
                sed -i "/#pragma once/a\\
              #include \"eeconfig_kb.h\"" "$config"
              fi

              cd /qmk && qmk compile -kb "$KEYBOARD" -km "$KEYMAP"

              mkdir -p /workspace/build
              cp -f "/qmk/.build/keychron_v6_max_ansi_encoder_${KEYMAP}.bin" /workspace/build/ || true
              cp -f "/qmk/.build/keychron_v6_max_ansi_encoder_${KEYMAP}.hex" /workspace/build/ || true
              chmod -R a+rw /workspace/build
            '

      - name: Prepare release assets
        if: startsWith(github.ref, 'refs/tags/max-v')
        id: assets
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          # Keychron firmware anchor: BCD DEVICE_VER (0x0112 -> 1.1.2)
          RAW=$(grep -oP '#define DEVICE_VER 0x\K[0-9A-Fa-f]+' \
            "max/keymaps/keychron/v6_max/ansi_encoder/keymaps/${KEYMAP}/config.h")
          echo "anchor=$((10#${RAW:0:2})).$((10#${RAW:2:1})).$((10#${RAW:3:1}))" >> "$GITHUB_OUTPUT"
          for ext in bin hex; do
            SRC="max/build/keychron_v6_max_ansi_encoder_${KEYMAP}.${ext}"
            DST="max/build/${TAG}-keychron_v6_max.${ext}"
            cp "$SRC" "$DST"
            sha256sum "$DST" > "${DST}.sha256"
          done

      - name: Upload firmware artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: firmware
          path: |
            max/build/keychron_v6_max_ansi_encoder_*.bin
            max/build/keychron_v6_max_ansi_encoder_*.hex
          retention-days: 7

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/max-v')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          name: "Keychron V6 Max ${{ github.ref_name }}"
          body: |
            Dwerty firmware for the Keychron V6 Max (QMK).

            Reports Keychron firmware version ${{ steps.assets.outputs.anchor }} (DEVICE_VER) for Launcher and VIA compatibility. Flash the .bin with the Keychron Launcher or a DFU tool. SHA256 sums are attached.
          files: |
            max/build/max-v*-keychron_v6_max.bin
            max/build/max-v*-keychron_v6_max.bin.sha256
            max/build/max-v*-keychron_v6_max.hex
            max/build/max-v*-keychron_v6_max.hex.sha256
          generate_release_notes: true
